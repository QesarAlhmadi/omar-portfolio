# =============================================================================
# Hugo Configuration (hugo.toml) - الموقع الشخصي للمطور عمر الحمادي
# المسار الصحيح: omar-portfolio-main/hugo.toml
# =============================================================================

baseURL = "/"
title = "عمر الحمادي | مبرمج ومطور برمجيات"
defaultContentLanguage = "ar"
theme = ["PaperMod"] # تفعيل القالب كنسخة احتياطية للموديلات

# تمكين الاختصارات البرمجية وتنسيق الروابط
enableInlineShortcodes = true
enableRobotsTXT = true

[minify]
  disableXML = false
  [minify.tdewolff.html]
    keepWhitespace = false

[languages.ar]
  languageName = "العربية"
  contentDir = "content" # تحديد مكان المحتوى بدقة
  weight = 1
  title = "عمر الحمادي"
  languageCode = "ar-ye"
  [languages.ar.params]
    displayFullLangName = true
    description = "طالب تقنية معلومات ومطور برمجيات متخصص في بناء حلول الويب"
    author = "عمر الحمادي"
    
    # إعدادات واجهة PaperMod (Home Page)
    [languages.ar.params.homeInfoParams]
        Title = "مرحباً بك في فضائي التقني 🚀"
        Content = "أنا عمر، طالب IT ومطور برمجيات. أهتم بالأمن السيبراني وبناء الأنظمة الذكية."

    # أيقونات التواصل الاجتماعي
    [[languages.ar.params.socialIcons]]
        name = "github"
        url = "https://github.com/QesarAlhmadi"
    [[languages.ar.params.socialIcons]]
        name = "linkedin"
        url = "#" # يمكنك إضافة رابطك هنا لاحقاً

[permalinks]
  posts = "/posts/:slug/"
  projects = "/projects/:slug/"

[params]
  env = "production"
  description = "الموقع الرسمي للمطور عمر الحمادي. استكشف مشاريعي البرمجية ومدونتي التقنية."
  author = "عمر الحمادي"
  defaultTheme = "auto"
  showCodeCopyButtons = true
  
  # إعدادات الصور والمعاينة
  images = ["/images/profile.jpg"]

  [params.assets]
    disableHLJS = false # تفعيل تظليل الأكواد البرمجية

[module]
  [[module.imports]]
    path = "github.com/adityatelange/hugo-PaperMod"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "المدونة"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "projects"
    name = "المشاريع"
    url = "/projects/"
    weight = 20
