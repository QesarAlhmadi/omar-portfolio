# =============================================================================
# Hugo Configuration (hugo.toml) - النسخة المصححة والنهائية
# =============================================================================

baseURL = "/"
defaultContentLanguage = "ar"
title = "عمر الحمادي | مبرمج ومطور برمجيات"
enableInlineShortcodes = true
enableRobotsTXT = true

# ملاحظة: تم حذف سطر theme نهائياً والاعتماد على الموديول أسفله
[module]
  [[module.imports]]
    path = "github.com/adityatelange/hugo-PaperMod"

# إعدادات اللغة العربية ودعم الاتجاه من اليمين لليسار
[languages.ar]
  languageName = "العربية"
  languageCode = "ar-ye"
  contentDir = "content"
  weight = 1
  [languages.ar.params]
    displayFullLangName = true
    description = "طالب تقنية معلومات ومطور برمجيات"
    author = "عمر الحمادي"
    [languages.ar.params.homeInfoParams]
      Title = "مرحباً بك في فضائي التقني 🚀"
      Content = "أنا عمر، طالب IT ومطور برمجيات. أهتم بالأمن السيبراني وبناء الأنظمة الذكية."

# إعدادات الروابط الدائمة (Permalinks)
[permalinks]
  posts = "/posts/:slug/"
  projects = "/projects/:slug/"

# إعدادات القالب والمميزات التقنية
[params]
  env = "production"
  description = "الموقع الرسمي للمطور عمر الحمادي"
  author = "عمر الحمادي"
  defaultTheme = "auto"
  showCodeCopyButtons = true
  
  # أيقونات التواصل الاجتماعي
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/QesarAlhmadi"

# ضغط الملفات لتحسين الأداء على Netlify
[minify]
  disableXML = false
  [minify.tdewolff.html]
    keepWhitespace = false

# قائمة التنقل العلوية
[menu]
  [[menu.main]]
    identifier = "posts"
    name = "المدونة"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "projects"
    name = "المشاريع"
    url = "/projects/"
    weight = 20
