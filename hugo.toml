# =============================================================================
# Hugo Configuration (hugo.toml) - النسخة النهائية العاملة 100%
# =============================================================================

baseURL = "https://alqesarsoft.netlify.app/"
defaultContentLanguage = "ar"
title = "عمر الحمادي | مبرمج ومطور برمجيات"
theme = "PaperMod"
enableInlineShortcodes = true
enableRobotsTXT = true

[languages.ar]
  languageName = "العربية"
  languageCode = "ar-ye"
  contentDir = "content"
  weight = 1
  [languages.ar.params]
    displayFullLangName = true
    description = "طالب تقنية معلومات ومطور برمجيات"
    author = "عمر الحمادي"
    [languages.ar.params.homeInfoParams]
      Title = "مرحباً بك في فضائي التقني 🚀"
      Content = "أنا عمر، طالب IT ومطور برمجيات. أهتم بالأمن السيبراني وبناء الأنظمة الذكية."

[permalinks]
  posts = "/posts/:slug/"
  projects = "/projects/:slug/"

[params]
  env = "production"
  description = "الموقع الرسمي للمطور عمر الحمادي"
  author = "عمر عبدالعزيز الحمادي"
  defaultTheme = "auto"
  showCodeCopyButtons = true

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/QesarAlhmadi"

[minify]
  disableXML = false
  [minify.tdewolff.html]
    keepWhitespace = false

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "المدونة"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "projects"
    name = "المشاريع"
    url = "/projects/"
    weight = 20
