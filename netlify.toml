# =============================================================================
# Netlify Configuration (netlify.toml) - المسار الصحيح: المسار الجذري (Root)
# =============================================================================

[build]
  # أمر البناء: استخدام Hugo مع تفعيل ميزات التحسين القصوى وتنظيف الذاكرة
  command = "hugo --minify --gc"
  # مجلد النشر الذي سيحتوي على ملفات الموقع النهائية
  publish = "public"

# إعدادات البيئة وتحديد إصدار Hugo مستقر
[build.environment]
  HUGO_VERSION = "0.121.0"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), usb=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # سياسة أمن المحتوى (CSP) مطورة ومصححة لدعم Decap CMS و Netlify Identity بأمان كامل
    Content-Security-Policy = """
    default-src 'self';
    script-src 'self' 'unsafe-inline' 'unsafe-eval' https://identity.netlify.com https://unpkg.com;
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    img-src 'self' data: blob: https://res.cloudinary.com;
    font-src 'self' https://fonts.gstatic.com;
    connect-src 'self' https://identity.netlify.com;
    frame-src 'self' https://identity.netlify.com;
    frame-ancestors 'none';
    base-uri 'self';
    form-action 'self';
    """

# إعدادات إعادة التوجيه للوحة التحكم (حاسمة جداً لعمل Decap CMS بشكل صحيح)
[[redirects]]
  from = "/admin/*"
  to = "/admin/"
  status = 200
