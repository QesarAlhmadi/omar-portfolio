<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>لوحة تحكم الموقع | عمر الحمادي</title>
  
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.1.0/dist/decap-cms.js"></script>

  <script>
    // هندسة التوجيه التلقائي لضمان تجربة مستخدم سلسة
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", (user) => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            // التوجيه للوحة التحكم فور نجاح تسجيل الدخول
            document.location.href = "/admin/";
          });
        }
      });

      // في حال تسجيل الخروج، العودة للموقع الرئيسي
      window.netlifyIdentity.on("logout", () => {
        document.location.href = "/";
      });
    }
  </script>
</body>
</html>
