# =============================================================================
# Decap CMS Configuration (config.yml) 
# المسار: omar-portfolio-main/static/admin/config.yml
# =============================================================================

backend:
  name: git-gateway
  branch: main
  repo: QesarAlhmadi/omar-portfolio

# وضع التحرير: يسمح لك بمراجعة المقالات قبل نشرها فعلياً
publish_mode: editorial_workflow

# إعدادات الوسائط (Images)
media_folder: "static/images" # المجلد الفعلي في المستودع
public_folder: "/images"       # المسار الذي سيظهر في الروابط

site_url: https://omar-portfolio.netlify.app
display_url: https://omar-portfolio.netlify.app
locale: 'ar' # واجهة عربية

collections:
  # ---- 1. قسم المدونة (Posts) - متزامن مع hugo.toml ----
  - name: "posts"
    label: "المدونة"
    label_singular: "مقال"
    folder: "content/posts"
    create: true
    format: "yaml-frontmatter"
    extension: "md"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "عنوان المقال", name: "title", widget: "string" }
      - { label: "تاريخ النشر", name: "date", widget: "datetime" }
      - { label: "وصف مختصر", name: "description", widget: "text" }
      - { label: "صورة المقال", name: "image", widget: "image", required: false }
      - { label: "محتوى المقال", name: "body", widget: "markdown" }

  # ---- 2. معرض المشاريع (Projects) ----
  - name: "projects"
    label: "المشاريع"
    label_singular: "مشروع"
    folder: "content/projects"
    create: true
    format: "yaml-frontmatter"
    extension: "md"
    slug: "{{slug}}"
    fields:
      - { label: "اسم المشروع", name: "title", widget: "string" }
      - { label: "عن المشروع", name: "description", widget: "text" }
      - { label: "رابط المشروع", name: "link", widget: "string", required: false }
      - { label: "صورة توضيحية", name: "image", widget: "image", required: false }
      - { label: "التقنيات", name: "tags", widget: "list", required: false }
      - { label: "التفاصيل التقنية", name: "body", widget: "markdown" }

  # ---- 3. إعدادات الصفحة الرئيسية ----
  - name: "about"
    label: "الصفحة التعريفية"
    files:
      - label: "الملف الشخصي (عمر)"
        name: "home"
        file: "content/_index.md"
        fields:
          - { label: "الاسم الرئيسي", name: "title", widget: "string" }
          - { label: "الوصف المهني", name: "description", widget: "text" }
          - { label: "نص الترحيب", name: "body", widget: "markdown" }
